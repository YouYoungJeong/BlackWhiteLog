<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 찾기 - 흑백로그</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/find_password.css') }}" />
</head>
<body>
    <div class="page">
        <div class="card">
            <h1 class="title">비밀번호 찾기</h1>
            <p class="desc">이메일 인증 후 새 비밀번호로 변경할 수 있습니다.</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-wrap">
                        {% for message in messages %}
                            <div class="flash">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login.find_password') }}">
                <div class="field">
                    <label for="email">이메일</label>
                    <div class="inline-row">
                        <input type="email" id="email" name="email" placeholder="가입한 이메일 입력" required />
                        <button type="button" class="btn btn-sub" id="sendCodeBtn">인증번호 전송</button>
                    </div>
                    <div id="sendStatus" class="status-text"></div>
                    <div id="timer" class="timer"></div>
                </div>

                <div class="field">
                    <label for="code">인증번호</label>
                    <div class="inline-row">
                        <input type="text" id="code" placeholder="6자리 인증번호 입력" />
                        <button type="button" class="btn btn-sub" id="verifyCodeBtn">인증 확인</button>
                    </div>
                    <div id="verifyStatus" class="status-text"></div>
                </div>

                <div class="field">
                    <label for="new_password">새 비밀번호</label>
                    <input type="password" id="new_password" name="new_password" placeholder="새 비밀번호 입력" required />
                </div>

                <div class="field">
                    <label for="new_password_confirm">새 비밀번호 확인</label>
                    <input type="password" id="new_password_confirm" name="new_password_confirm" placeholder="새 비밀번호 다시 입력" required />
                </div>

                <button type="submit" class="btn btn-main">비밀번호 변경</button>
            </form>
        </div>
    </div>

    <script>
        const sendCodeBtn = document.getElementById("sendCodeBtn");
        const verifyCodeBtn = document.getElementById("verifyCodeBtn");
        const emailInput = document.getElementById("email");
        const codeInput = document.getElementById("code");
        const sendStatus = document.getElementById("sendStatus");
        const verifyStatus = document.getElementById("verifyStatus");
        const timerBox = document.getElementById("timer");

        let timerInterval = null;
        let timeLeft = 0;

        function startTimer(seconds) {
            clearInterval(timerInterval);
            timeLeft = seconds;

            timerInterval = setInterval(() => {
                const minutes = String(Math.floor(timeLeft / 60)).padStart(2, "0");
                const seconds = String(timeLeft % 60).padStart(2, "0");
                timerBox.textContent = `남은 시간 ${minutes}:${seconds}`;

                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    timerBox.textContent = "인증시간이 만료되었습니다.";
                }
            }, 1000);
        }

        sendCodeBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();

            sendStatus.textContent = "";
            verifyStatus.textContent = "";

            if (!email) {
                sendStatus.textContent = "이메일을 입력해주세요.";
                sendStatus.className = "status-text error";
                return;
            }

            const formData = new FormData();
            formData.append("email", email);

            try {
                const response = await fetch("/login/send-reset-code", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                sendStatus.textContent = data.message;
                sendStatus.className = data.success ? "status-text success" : "status-text error";

                if (data.success) {
                    startTimer(180);
                }
            } catch (error) {
                sendStatus.textContent = "요청 중 오류가 발생했습니다.";
                sendStatus.className = "status-text error";
            }
        });

        verifyCodeBtn.addEventListener("click", async () => {
            const email = emailInput.value.trim();
            const code = codeInput.value.trim();

            verifyStatus.textContent = "";

            if (!email || !code) {
                verifyStatus.textContent = "이메일과 인증번호를 입력해주세요.";
                verifyStatus.className = "status-text error";
                return;
            }

            const formData = new FormData();
            formData.append("email", email);
            formData.append("code", code);

            try {
                const response = await fetch("/login/verify-reset-code", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                verifyStatus.textContent = data.message;
                verifyStatus.className = data.success ? "status-text success" : "status-text error";

                if (data.success) {
                    clearInterval(timerInterval);
                    timerBox.textContent = "이메일 인증이 완료되었습니다.";
                }
            } catch (error) {
                verifyStatus.textContent = "요청 중 오류가 발생했습니다.";
                verifyStatus.className = "status-text error";
            }
        });
    </script>
</body>
</html>

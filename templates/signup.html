<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 한글 인코딩 -->
    <meta charset="UTF-8">

    <!-- 모바일/반응형 화면 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 브라우저 탭 제목 -->
    <title>회원가입</title>

    <!-- 회원가입 전용 CSS 연결 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/signup.css') }}">
</head>
<body>
    <!-- 회원가입 전체 박스 -->
    <div class="page">

        <!-- 상단 로고 영역 -->
        <div class="logo-wrap">
            <img
                src="{{ url_for('static', filename='img/main_logo.png') }}"
                alt="흑백로그 로고"
                class="signup-logo"
            >
        </div>

        <br>

        <!-- 페이지 제목 -->
        <h1 class="title">회원가입</h1>

        <!-- 안내 문구 / 구분선 -->
        <div class="top-line">* 필수입력사항</div>
        <div class="divider"></div>

        <!-- Flask flash 메시지가 있으면 alert로 출력 -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <script>
                    alert("{{ messages[-1] }}");
                </script>
            {% endif %}
        {% endwith %}

        <!-- 회원가입 폼 시작 -->
        <form action="{{ url_for('signup') }}" method="post" id="signupForm">

            <!-- 이메일 중복확인 여부 저장 -->
            <input type="hidden" name="email_checked" id="email_checked" value="false">

            <!-- 중복확인 완료된 이메일 값 저장 -->
            <input type="hidden" name="checked_email_value" id="checked_email_value" value="">

            <!-- 입력 항목 전체 묶음 -->
            <div class="form-table">

                <!-- 닉네임 입력 -->
                <div class="form-row">
                    <label class="label" for="nickname">
                        닉네임<span class="req">*</span>
                    </label>

                    <div class="input-wrap">
                        <input
                            type="text"
                            id="nickname"
                            name="nickname"
                            class="input"
                            placeholder="닉네임을 입력해주세요"
                            required
                        >
                    </div>
                </div>

                <!-- 이메일 입력 -->
                <div class="form-row">
                    <label class="label" for="email">
                        이메일<span class="req">*</span>
                    </label>

                    <div class="input-wrap">
                        <div class="input-row">
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="input"
                                placeholder="예: blackwhitelog@gmail.com"
                                required
                            >
                            <button type="button" class="action-btn" id="checkEmailBtn">
                                중복 확인
                            </button>
                        </div>

                        <!-- 이메일 중복 확인 결과 메시지 -->
                        <div id="emailMessage" class="check-message"></div>
                    </div>
                </div>

                <!-- 비밀번호 입력 -->
                <div class="form-row">
                    <label class="label" for="password">
                        비밀번호<span class="req">*</span>
                    </label>

                    <div class="input-wrap">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="input"
                            placeholder="비밀번호를 입력해주세요"
                            required
                        >
                    </div>
                </div>

                <!-- 비밀번호 확인 입력 -->
                <div class="form-row">
                    <label class="label" for="password_confirm">
                        비밀번호 확인<span class="req">*</span>
                    </label>

                    <div class="input-wrap">
                        <input
                            type="password"
                            id="password_confirm"
                            name="password_confirm"
                            class="input"
                            placeholder="비밀번호를 한번 더 입력해주세요"
                            required
                        >
                    </div>
                </div>

                <br>

                <!-- 성별 선택 -->
                <div class="form-row">
                    <label class="label">
                        성별<span class="req">*</span>
                    </label>

                    <div class="input-wrap">
                        <div class="gender-group">
                            <label class="radio-item">
                                <input type="radio" name="gender" value="male" required>
                                남자
                            </label>

                            <label class="radio-item">
                                <input type="radio" name="gender" value="female" required>
                                여자
                            </label>

                            <label class="radio-item">
                                <input type="radio" name="gender" value="none" required>
                                선택안함
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 생년월일 입력 -->
                <div class="form-row">
                    <label class="label">
                        생년월일<span class="req">*</span>
                    </label>

                    <div class="input-wrap">
                        <div class="birth-row">
                            <input
                                type="text"
                                name="birth_year"
                                class="birth-input"
                                placeholder="YYYY"
                                maxlength="4"
                                required
                            >

                            <div class="slash">/</div>

                            <input
                                type="text"
                                name="birth_month"
                                class="birth-input"
                                placeholder="MM"
                                maxlength="2"
                                required
                            >

                            <div class="slash">/</div>

                            <input
                                type="text"
                                name="birth_day"
                                class="birth-input"
                                placeholder="DD"
                                maxlength="2"
                                required
                            >
                        </div>
                    </div>
                </div>

                <br>

                <!-- 주소 입력 -->
                <div class="form-row">
                    <label class="label">
                        주소<span class="req">*</span>
                    </label>

                    <div class="input-wrap address-block">

                        <!-- 카카오 우편번호 API 실행 버튼 -->
                        <button type="button" class="full-btn" onclick="execDaumPostcode()">
                            <span>🔍 주소 검색</span>
                        </button>

                        <!-- 우편번호 -->
                        <input
                            type="text"
                            id="postcode"
                            name="postcode"
                            class="input"
                            placeholder="우편번호"
                            readonly
                            required
                        >

                        <!-- 도로명 주소 -->
                        <input
                            type="text"
                            id="roadAddress"
                            name="roadAddress"
                            class="input"
                            placeholder="도로명 주소"
                            readonly
                            required
                        >

                        <!-- 지번 주소 -->
                        <input
                            type="text"
                            id="jibunAddress"
                            name="jibunAddress"
                            class="input"
                            placeholder="지번 주소"
                            readonly
                        >

                        <!-- 상세 주소 -->
                        <input
                            type="text"
                            id="detailAddress"
                            name="detailAddress"
                            class="input"
                            placeholder="상세주소를 입력해주세요"
                            required
                        >

                        <!-- 참고 항목 -->
                        <input
                            type="text"
                            id="extraAddress"
                            name="extraAddress"
                            class="input"
                            placeholder="참고항목"
                            readonly
                        >
                    </div>
                </div>

                <br>

                <!-- 혜택 알림 수신 동의 -->
                <div class="form-row agree-row">
                    <label class="label agree-label">혜택 알림</label>

                    <div class="input-wrap agree-wrap">
                        <label class="check-item agree-item">
                            <input type="checkbox" name="ad_agree" value="Y">
                            <span>(선택) 이벤트·할인 정보 수신 동의</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- 가입 버튼 -->
            <div class="submit-area">
                <button type="submit" class="submit-btn">가입하기</button>
            </div>
        </form>
    </div>

    <!-- 카카오 주소 검색 API -->
    <script src="//t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <!-- 회원가입 전용 JS -->
    <script src="{{ url_for('static', filename='js/signup.js') }}"></script>
</body>
</html>

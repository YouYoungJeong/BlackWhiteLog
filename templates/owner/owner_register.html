<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판매자 등록 | 흑백로그</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <div class="app-shell" style="max-width: 760px; margin: 40px auto; padding: 0 20px;">
        <div class="sidebar" style="padding: 28px;">
            <h1 style="margin-top: 0;">판매자 등록</h1>
            <p style="color: #6f776d;">매장 정보를 입력해 흑백로그에 등록할 수 있습니다.</p>

            <form>
                <div style="display: grid; gap: 14px;">
                    <input type="text" placeholder="상호명" class="search-input" />
                    <input type="text" placeholder="대표자명" class="search-input" />
                    <input type="text" placeholder="연락처" class="search-input" />
                    <input type="text" placeholder="도로명 주소" class="search-input" />
                    <input type="text" placeholder="카테고리" class="search-input" />
                    <textarea placeholder="매장 소개" class="search-input" style="height: 140px; padding-top: 14px;"></textarea>

                    <button type="submit" class="search-btn">등록 신청하기</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

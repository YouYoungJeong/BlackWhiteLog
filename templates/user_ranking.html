<div id="rankingContainer" class="hidden-view" style="display: none;">

        <h3>🏆 명예의 전당</h3>
        <div id="rankListItems"></div>
    </div>

    <div id="rankDashboard" class="rank-main-dashboard">
        <div class="dash-grid">
            <div class="dash-item profile-sec">
                <img id="my-rank-img" src="">
                <h2 id="my-rank-name"></h2>
                <span id="my-rank-tier"></span>
            </div>
            <div class="dash-item gauge-sec">
                <h4>다음 등급까지</h4>
                <div class="bar-bg"><div id="my-rank-bar" class="bar-fill"></div></div>
                <p><span id="my-rank-pts"></span> / 10,000 P</p>
            </div>
            <div class="dash-item badge-sec"><h4>획득 뱃지</h4><div id="my-badges"></div></div>
            <div class="dash-item mission-sec"><h4>주간 미션</h4><ul id="my-missions"></ul></div>
        </div>
    </div>
</div>

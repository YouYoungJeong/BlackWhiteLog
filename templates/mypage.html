<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 흑백로그</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mypage.css') }}">
</head>
<body>
    <div class="mypage-wrap">
        <div class="mypage-card">
            <div class="mypage-header">
                <div class="mypage-avatar">👤</div>
                <div class="mypage-user-info">
                    <h1 class="mypage-title">마이페이지</h1>
                    <p class="mypage-subtitle">내 정보와 활동을 확인해보세요</p>
                </div>
            </div>

            <div class="mypage-info-box">
                <div class="mypage-row">
                    <span class="mypage-label">닉네임</span>
                    <span class="mypage-value">{{ session.get('user_nickname') }}</span>
                </div>

                <div class="mypage-row">
                    <span class="mypage-label">이메일</span>
                    <span class="mypage-value">{{ session.get('user_email') }}</span>
                </div>
            </div>

            <div class="mypage-menu">
                <a href="#" class="mypage-menu-item">내 리뷰 보기</a>
                <a href="#" class="mypage-menu-item">즐겨찾기</a>
                <a href="#" class="mypage-menu-item">방문 기록</a>
                <a href="#" class="mypage-menu-item">업적 / 랭킹</a>
            </div>

            <div class="mypage-actions">
                <a href="{{ url_for('index') }}" class="mypage-home-btn">메인으로 돌아가기</a>

                <form action="{{ url_for('withdraw') }}" method="post">
                    <button type="submit" class="mypage-withdraw-btn">회원탈퇴</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>흑백로그 | 메뉴 관리</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/owner_layout_common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/owner_drawer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/owner_menu_management.css') }}">

    <script defer src="{{ url_for('static', filename='js/owner_drawer.js') }}"></script>
    <script defer src="{{ url_for('static', filename='js/owner_menu_management.js') }}"></script>
</head>
<body>
    <header class="top-header">
        <div class="header-left">
            <a href="{{ url_for('owner_board') }}" class="brand-wrap" aria-label="흑백로그 오너 대시보드로 이동">
                <div class="brand-logo">
                    <img
                        src="{{ url_for('static', filename='img/main_logo.png') }}"
                        alt="흑백로그 로고"
                        class="main-logo"
                    >
                </div>
            </a>
        </div>

        <div class="header-right">
            <p class="today-date">2026.03.13 FRI</p>

            <div class="store-profile">
                <p class="store-name">사장님</p>
                <div class="profile-circle" aria-hidden="true">👨‍🍳</div>
            </div>

            <button
                type="button"
                class="menu-toggle"
                id="drawerOpenBtn"
                aria-label="사이드 메뉴 열기"
                aria-controls="sideDrawer"
                aria-expanded="false"
            >
                ☰
            </button>
        </div>
    </header>

    <main class="main-content">
        <section class="menu-form-card">
            <h2 class="section-title">메뉴 등록</h2>

            <div class="menu-upload-section">
                <h3 class="sub-title">메뉴 사진 등록</h3>

                <div class="upload-form-grid">
                    <div class="image-upload-box">
                        <div class="preview-image-wrap">
                            <img
                                src="{{ url_for('static', filename='img/sample_menu.jpg') }}"
                                alt="메뉴 이미지 미리보기"
                                class="preview-image"
                            >
                        </div>

                        <button type="button" class="point-btn upload-btn">이미지 업로드</button>
                    </div>

                    <div class="menu-input-area">
                        <div class="form-row form-column">
                            <label for="menu-name">메뉴명</label>
                            <input type="text" id="menu-name" name="menu_name" placeholder="메뉴명을 입력하세요">
                        </div>

                        <div class="form-row form-column">
                            <label for="menu-price">가격</label>
                            <div class="price-input-wrap">
                                <input type="number" id="menu-price" name="menu_price" placeholder="가격 입력">
                                <span class="price-unit">원</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="menu-detail-section">
                <div class="form-row horizontal-row">
                    <div class="field-group category-group">
                        <label for="menu-category">카테고리</label>
                        <select id="menu-category" name="menu_category">
                            <option value="main">메인</option>
                            <option value="side">사이드</option>
                            <option value="drink">음료</option>
                            <option value="dessert">디저트</option>
                        </select>
                    </div>

                    <div class="field-group description-group">
                        <label for="menu-description">설명</label>
                        <input type="text" id="menu-description" name="menu_description" placeholder="메뉴 설명을 입력하세요">
                    </div>
                </div>
            </div>

            <div class="menu-option-section">
                <h3 class="sub-title">옵션 설정</h3>

                <div class="option-group-wrap">
                    <button type="button" class="outline-btn option-add-btn">＋ 옵션 그룹 추가</button>
                </div>

                <div class="checkbox-row">
                    <label class="check-item">
                        <input type="checkbox" name="soldout">
                        <span>품절 처리</span>
                    </label>

                    <label class="check-item">
                        <input type="checkbox" name="hidden">
                        <span>숨김</span>
                    </label>
                </div>
            </div>

            <div class="action-btn-row">
                <button type="button" class="ghost-btn">취소</button>
                <button type="button" class="sub-btn">임시저장</button>
                <button type="submit" class="point-btn">등록완료</button>
            </div>
        </section>

        <section class="registered-menu-card">
            <h2 class="section-title">등록된 메뉴</h2>

            <div class="registered-menu-list">
                <article class="registered-menu-item">
                    <div class="registered-menu-thumb">
                        <img src="{{ url_for('static', filename='img/sample_menu.jpg') }}" alt="수원비빔밥 이미지">
                    </div>

                    <div class="registered-menu-info">
                        <p class="registered-menu-name">수원비빔밥</p>
                        <p class="registered-menu-price">12,000원</p>
                    </div>

                    <div class="registered-menu-actions">
                        <button type="button" class="menu-edit-btn">수정</button>
                        <button type="button" class="menu-delete-btn">삭제</button>
                    </div>
                </article>

                <article class="registered-menu-item">
                    <div class="registered-menu-thumb">
                        <img src="{{ url_for('static', filename='img/sample_menu.jpg') }}" alt="돌솥비빔밥 이미지">
                    </div>

                    <div class="registered-menu-info">
                        <p class="registered-menu-name">돌솥비빔밥</p>
                        <p class="registered-menu-price">13,000원</p>
                    </div>

                    <div class="registered-menu-actions">
                        <button type="button" class="menu-edit-btn">수정</button>
                        <button type="button" class="menu-delete-btn">삭제</button>
                    </div>
                </article>

                <article class="registered-menu-item">
                    <div class="registered-menu-thumb">
                        <img src="{{ url_for('static', filename='img/sample_menu.jpg') }}" alt="제육비빔밥 이미지">
                    </div>

                    <div class="registered-menu-info">
                        <p class="registered-menu-name">제육비빔밥</p>
                        <p class="registered-menu-price">13,500원</p>
                    </div>

                    <div class="registered-menu-actions">
                        <button type="button" class="menu-edit-btn">수정</button>
                        <button type="button" class="menu-delete-btn">삭제</button>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <div class="side-drawer-backdrop" id="sideDrawerBackdrop" hidden></div>

    <aside class="side-drawer" id="sideDrawer" aria-hidden="true">
        <div class="side-drawer__header">
            <button
                type="button"
                class="side-drawer__close"
                id="sideDrawerCloseBtn"
                aria-label="메뉴 닫기"
            >
                ×
            </button>

            <div class="side-drawer__profile">
                <div class="side-drawer__avatar">
                    <span>👨‍🍳</span>
                </div>
                <strong class="side-drawer__name">사장님</strong>
            </div>
        </div>

        <div class="side-drawer__body">
            <nav class="side-drawer__nav">
                <a href="{{ url_for('owner_board') }}" class="side-drawer__item">
                    <span class="side-drawer__icon">⌂</span>
                    <span>대시보드</span>
                </a>

                <a href="{{ url_for('owner_menu_management') }}" class="side-drawer__item">
                    <span class="side-drawer__icon">▣</span>
                    <span>메뉴 관리</span>
                </a>

                <a href="{{ url_for('owner_review_management') }}" class="side-drawer__item">
                    <span class="side-drawer__icon">✎</span>
                    <span>리뷰 관리</span>
                </a>
            </nav>

            <div class="side-drawer__divider"></div>

            <div class="side-drawer__section-title">기타</div>

            <div class="side-drawer__sublist">
                <a href="#" class="side-drawer__subitem">설정</a>
                <a href="#" class="side-drawer__subitem">고객센터</a>
                <a href="#" class="side-drawer__subitem">이용약관</a>
            </div>
        </div>
    </aside>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <strong>흑백로그</strong>
                <span>Black &amp; White Log</span>
            </div>

            <div class="footer-info">
                <p>© 2026 흑백로그. All rights reserved.</p>
                <p>메뉴 및 매장 정보는 운영 정책과 실제 판매 상황에 따라 변경될 수 있습니다.</p>
                <p>서비스 내 콘텐츠 및 이미지의 권리는 각 권리자에게 있습니다.</p>
            </div>
        </div>
    </footer>

    <script>
        (function () {
            const openBtn = document.getElementById('drawerOpenBtn');
            const closeBtn = document.getElementById('sideDrawerCloseBtn');
            const drawer = document.getElementById('sideDrawer');
            const backdrop = document.getElementById('sideDrawerBackdrop');

            if (!openBtn || !closeBtn || !drawer || !backdrop) return;

            function openDrawer() {
                drawer.classList.add('is-open');
                backdrop.classList.add('is-open');
                backdrop.hidden = false;
                drawer.setAttribute('aria-hidden', 'false');
                openBtn.setAttribute('aria-expanded', 'true');
                document.body.classList.add('drawer-open');
            }

            function closeDrawer() {
                drawer.classList.remove('is-open');
                backdrop.classList.remove('is-open');
                drawer.setAttribute('aria-hidden', 'true');
                openBtn.setAttribute('aria-expanded', 'false');
                document.body.classList.remove('drawer-open');

                window.setTimeout(function () {
                    if (!drawer.classList.contains('is-open')) {
                        backdrop.hidden = true;
                    }
                }, 240);
            }

            openBtn.addEventListener('click', openDrawer);
            closeBtn.addEventListener('click', closeDrawer);
            backdrop.addEventListener('click', closeDrawer);

            document.addEventListener('keydown', function (event) {
                if (event.key === 'Escape' && drawer.classList.contains('is-open')) {
                    closeDrawer();
                }
            });
        })();
    </script>
</body>
</html>

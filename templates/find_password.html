<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 찾기</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/find_account.css') }}">
</head>
<body>
    <div class="find-page">
        <div class="find-card">
            <h1>비밀번호 재설정</h1>
            <p class="find-desc">가입한 이메일과 닉네임을 입력한 뒤 새 비밀번호를 설정해주세요.</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-wrap">
                        {% for message in messages %}
                            <div class="flash-message">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" class="find-form">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="이메일 입력" required>

                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" name="nickname" placeholder="닉네임 입력" required>

                <label for="new_password">새 비밀번호</label>
                <input type="password" id="new_password" name="new_password" placeholder="새 비밀번호 입력" required>

                <label for="new_password_confirm">새 비밀번호 확인</label>
                <input type="password" id="new_password_confirm" name="new_password_confirm" placeholder="새 비밀번호 다시 입력" required>

                <button type="submit" class="find-btn">비밀번호 변경</button>
            </form>

            <div class="bottom-links">
                <a href="{{ url_for('find_id') }}">이메일 찾기</a>
                <a href="{{ url_for('login') }}">로그인으로 돌아가기</a>
            </div>
        </div>
    </div>
</body>
</html>

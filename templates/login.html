<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>흑백로그 로그인</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

<!-- 아이콘 -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="login-page">

<div class="login-wrapper">

<div class="login-card">

    <!-- 로고 -->
    <div class="login-logo">
        <img src="{{ url_for('static', filename='img/main_logo.png') }}">
    </div>

    <p class="login-desc">
        자신만의 맛집 랭킹을 달성해보자!
    </p>

    <!-- 로그인 실패 메시지 -->
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="login-error">
        {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}

    <!-- 로그인 -->
    <form method="POST" action="{{ url_for('login') }}">

        <div class="input-group">
            <input type="email" name="email" placeholder="이메일">
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="비밀번호">
        </div>

        <button class="login-btn" type="submit">
            로그인
        </button>

    </form>

    <!-- 회원가입 -->
    <div class="join-text">
        처음 오셨나요?
        <a href="{{ url_for('signup') }}">회원가입하기</a>
    </div>

    <!-- 구분선 -->
    <div class="divider">
        <span>간편 로그인</span>
    </div>

    <!-- 소셜 로그인 -->
    <div class="social-login">

        <a href="{{ url_for('login_naver') }}" class="social-btn naver">
        <img src="{{ url_for('static', filename='img/naver.png') }}" class="social-icon" alt="네이버">
        네이버
        </a>

        <a href="{{ url_for('login_kakao') }}" class="social-btn kakao">
        <img src="{{ url_for('static', filename='img/kakao.png') }}" class="social-icon" alt="카카오">
        카카오
        </a>

        <a href="{{ url_for('login_google') }}" class="social-btn google">
        <img src="{{ url_for('static', filename='img/google.png') }}" class="social-icon" alt="구글">
        구글
        </a>

    </div>

    <!-- 하단 링크 -->
    <div class="login-links">

        <a href="{{ url_for('find_id') }}">이메일 찾기</a>

        <span>|</span>

        <a href="{{ url_for('find_password') }}">비밀번호 찾기</a>

    </div>

</div>
</div>

<!-- 로그인 페이지 footer -->
<footer class="login-footer">

    <div class="login-footer-links">
        <a href="#">이용약관</a>
        <span>|</span>
        <a href="#">개인정보처리방침</a>
        <span>|</span>
        <a href="#">책임의 한계와 법적고지</a>
        <span>|</span>
        <a href="#">회원정보</a>
        <span>|</span>
        <a href="#">고객센터</a>
    </div>

    <div class="login-footer-copy">
        Copyright © 흑백로그 Corp. All Rights Reserved.
    </div>

</footer>

</body>
</html>
